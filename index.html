	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<style type="text/css">
		*,
		*:before,
		*:after {
			box-sizing: border-box;
		}

		body {
			font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
			font-weight: lighter;
			font-size: 20px;
			color: #333;
			background-color: #fff;
			padding: 0;
			margin: 0;
			height: 100vh;
		}

		a {
			color: #3498DB;
			text-decoration: none;
		}

		a:hover,
		a:focus {
			color: #2980B9;
			text-decoration: underline;
		}

		a:focus {
			outline: thin dotted;
			outline: 5px auto -webkit-focus-ring-color;
			outline-offset: -2px;
		}

		.container {
			margin: 0 auto;
			max-width: 768px;
			padding: 2em 1em;
			display: flex;
			flex-direction: column;
			min-height: 100%;
		}

		main {
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		h1 {
			font-size: 100px;
			font-weight: normal;
			margin: 0;
			text-align: center;
		}

		footer {
			font-size: 0.65em;
			font-weight: normal;
			background: #e7e7e7;
			border-radius: 0.25em;
			padding: 1em;
		}

		.footer-bugs {
			transform: rotate(180deg);
			transition: all .5s ease-in-out;
			display: inline-block;
		}

		.footer-bugs:hover {
			-webkit-transform: rotate(0);
			-ms-transform: rotate(0);
			transform: rotate(0);
		}

		@media (min-width: 640px) {
			body {
				font-size: 28px;
				height: 50vh;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<main>
			<h1>👨‍💻</h1>
		</main>
		<footer>
